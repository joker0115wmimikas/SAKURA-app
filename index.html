    function generateChoices(currentQuestion) {
      try {
        // 1. 専用のダミー（dummies）があればそれを使う
        if (currentQuestion.dummies && currentQuestion.dummies.length >= 3) {
          const dums = currentQuestion.dummies.slice(0,3);
          return [currentQuestion.a, ...dums].sort(() => 0.5 - Math.random());
        }
        
        // 2. なければ「同じカテゴリ」からダミーを選ぶ
        let sameCategoryData = rawData.filter(d => d.subject === currentQuestion.subject && d.category === currentQuestion.category && d.a !== currentQuestion.a);
        let others = [...new Set(sameCategoryData.map(d => d.a))];

        // 3. 足りなければ「同じ教科」から補充
        if (others.length < 3) {
           const sameSubjectData = rawData.filter(d => d.subject === currentQuestion.subject && d.a !== currentQuestion.a);
           const moreOthers = [...new Set(sameSubjectData.map(d => d.a))];
           others = [...new Set([...others, ...moreOthers])];
        }

        const shuffledOthers = others.sort(() => 0.5 - Math.random()).slice(0, 3);
        return [currentQuestion.a, ...shuffledOthers].sort(() => 0.5 - Math.random());
      } catch(e) {
        return [currentQuestion.a, "ダミーA", "ダミーB", "ダミーC"].sort(() => 0.5 - Math.random());
      }
    }

    window.startQuizCustom = function(filterType, subjectValue = null, categoryValue = null) {
      let filtered = rawData;
      if (filterType === 'vocab') {
        filtered = filtered.filter(q => q.subject === '英語');
      } else if (filterType === 'grade2') {
        filtered = filtered.filter(q => q.grade === 2 && q.subject === subjectValue);
        if (categoryValue && categoryValue !== 'all') filtered = filtered.filter(q => q.category === categoryValue);
      } else if (filterType === 'grade1') {
        filtered = filtered.filter(q => q.grade === 1 && q.subject === subjectValue);
        if (categoryValue && categoryValue !== 'all') filtered = filtered.filter(q => q.category === categoryValue);
      }
      prepareQuiz(filtered);
    }

    window.startWeaknessQuizCustom = function(filterType, subjectValue = null) {
      if (state.activeUser === 'guest') { 
        showMessage("ゲストモードでは苦手特訓は使えません。"); 
        return; 
      }
      let targetQuestions = rawData.filter(q => {
        if (filterType === 'vocab' && q.subject !== '英語') return false;
        if (filterType === 'grade2' && (q.grade !== 2 || q.subject !== subjectValue)) return false;
        if (filterType === 'grade1' && (q.grade !== 1 || q.subject !== subjectValue)) return false;
        
        const stat = state.userStats[q.id]; 
        if (!stat) return false;
        const total = stat.corrects + stat.mistakes; 
        if (total === 0) return false;
        return (stat.mistakes / total) >= 0.25 || stat.mistakes > stat.corrects;
      }).sort((a, b) => {
        const statA = state.userStats[a.id] || {corrects:0, mistakes:0}; 
        const statB = state.userStats[b.id] || {corrects:0, mistakes:0};
        const rateA = statA.mistakes / ((statA.corrects + statA.mistakes) || 1);
        const rateB = statB.mistakes / ((statB.corrects + statB.mistakes) || 1);
        return rateB - rateA;
      });

      if (targetQuestions.length === 0) { 
        showMessage("すばらしい！この範囲の極端に苦手な問題はありません。"); 
        return; 
      }
      prepareQuiz(targetQuestions.slice(0, 20));
    }

    function prepareQuiz(questions) {
      if(!questions || questions.length === 0) return;
      const prepared = questions.map(q => {
        const rand = Math.random();
        let type = 'normal';
        if (rand < 0.4) type = 'choice'; 
        else if (rand < 0.7) type = 'reverse';
        
        let choices = [];
        if (type === 'choice') choices = generateChoices(q);

        // 逆引き時の出題文を自然化
        let reverseQ = q.a ? String(q.a) : ''; 
        let reverseA = q.q ? String(q.q) : '';
        try {
          if (q.subject === '英語') {
            if (q.category === '英単語') { 
              reverseQ = `「${q.a}」の意味は？`; 
              reverseA = reverseA.replace('」を意味する英単語は？', '').replace('「', ''); 
            } else if (q.category === '熟語・文法') { 
              reverseQ = `「${q.a}」の意味は？`; 
              reverseA = reverseA.replace('」を英語で言うと？', '').replace('「', ''); 
            }
          } else { 
            reverseQ = `「${q.a}」とは何のこと？（どういう意味？）`; 
          }
        } catch(e) {}

        return { ...q, queueId: Math.random().toString(36).substr(2, 9), quizType: type, choices, isRetry: false, reverseQ, reverseA };
      }).sort(() => 0.5 - Math.random());

      state.quizQueue = prepared; 
      state.currentIndex = 0; 
      state.showAnswer = false; 
      state.selectedChoice = null; 
      state.choiceResult = null;
      state.sessionStats = { totalInitial: prepared.length, mistakes: 0 }; 
      state.screen = 'quiz'; 
      render();
    }

      const currentQ = state.quizQueue[state.currentIndex];
      if (state.activeUser !== 'guest') {
        const currentStat = state.userStats[currentQ.id] || { corrects: 0, mistakes: 0 };
        const newData = {

      if (!isCorrect) { 
        state.quizQueue.push({ ...currentQ, queueId: Math.random().toString(36).substr(2, 9), isRetry: true }); 
        state.sessionStats.mistakes++; 
      }
      if (state.currentIndex + 1 < state.quizQueue.length || !isCorrect) { 
        state.currentIndex++; 
        state.showAnswer = false; 
        state.selectedChoice = null; 
        state.choiceResult = null;

    function generateAiEvaluation() {
      let totalAttempts = 0; let totalMistakes = 0; let categoryStats = {};
      rawData.forEach(q => {
        if(!categoryStats[q.category]) categoryStats[q.category] = { attempts: 0, mistakes: 0, qs: [] };
        const stat = state.userStats[q.id];
        if (stat) { 
          const attempts = stat.corrects + stat.mistakes; 
          if (attempts > 0) { 
            totalAttempts += attempts; 
            totalMistakes += stat.mistakes; 
            categoryStats[q.category].attempts += attempts; 
            categoryStats[q.category].mistakes += stat.mistakes; 
            categoryStats[q.category].qs.push({ q: q.q, mistakes: stat.mistakes }); 
          } 
        }
      });
      const theme = userThemes[state.activeUser] || userThemes['sakura'];
      const userName = theme.name;
      
      if (totalAttempts === 0) return `なんじゃ、まだ一度もアプリを開いておらぬではないか！\n怠惰は最大の罪なり。まずは${userName}にアプリを開かせ、一問でも解かせるのじゃ！`;
      
      const accuracy = totalAttempts > 0 ? ((totalAttempts - totalMistakes) / totalAttempts) * 100 : 0;
      let evalText = `ふむ。我の帳簿によると、${userName}のこれまでの総解答数は【${totalAttempts}回】、正答率は【${Math.round(accuracy)}％】じゃな。\n\n`;
      
      if (accuracy >= 90) evalText += "見事な精進ぶりじゃ！地道な努力がしっかりと実を結んでおる。\nしかし、悪魔は油断した隙に忍び寄るもの。慢心せず、さらなる高みを目指させよ！\n";
      else if (accuracy >= 60) evalText += "まずまずの出来じゃな。努力の跡は見られるぞ。\nだが、まだ知識が定着しておらぬ部分がちらほら見受けられる。反復こそが記憶の定着への近道じゃ！\n";
      else evalText += "むむっ……これは少々苦戦しておるようじゃな。\n基礎がグラついておるかもしれんぞ。焦らず、一歩ずつ確実に理解させるのじゃ！\n";
      
      let worstCategory = null; 
      let maxMistakeRate = -1;
      for (let cat in categoryStats) { 
        if (categoryStats[cat].attempts > 1) { 
          const rate = categoryStats[cat].mistakes / categoryStats[cat].attempts; 
          if (rate > maxMistakeRate) { 
            maxMistakeRate = rate; 
            worstCategory = cat; 
          } 
        } 
      }
      
      if (worstCategory && maxMistakeRate > 0) {
        evalText += `\nとくに、【${worstCategory}】の分野に深い闇（弱点）を感じるぞ……。`;
        const worstQs = categoryStats[worstCategory].qs.sort((a,b) => b.mistakes - a.mistakes);
        if(worstQs.length > 0 && worstQs[0].mistakes > 0) { 
          evalText += `\nたとえば「${worstQs[0].q.substring(0, 15)}...」といった問題を何度も間違えておるようじゃ。\nこの辺りを重点的に復習させるのが点数アップへの道標じゃ！`; 
        }
      } else { 
        evalText += `\n今のところ、極端に苦手な深淵は見当たらぬ。この調子で満遍なく学習を続けるがよい！`; 
      }
      return evalText;
    }

    function renderQuizHTML() {
      const currentQ = state.quizQueue[state.currentIndex];
      if (!currentQ) return '';

      const isChoice = currentQ.quizType === 'choice'; 
      const isReverse = currentQ.quizType === 'reverse';
      const totalCurrent = state.quizQueue.length;
      const progressPercent = (state.currentIndex / totalCurrent) * 100;

      let cardHtml = '';

      if (isChoice) {
        const choicesHtml = currentQ.choices.map((choice, idx) => {
          let btnClass = "bg-gray-50 border-2 border-gray-200 text-gray-700 hover:bg-blue-50 hover:border-blue-300"; 
          let iconHtml = "";

          if (state.selectedChoice === choice) {
            if (state.choiceResult === 'correct') {
              btnClass = "bg-emerald-50 border-emerald-500 text-emerald-700";
              iconHtml = `<i class="ph-fill ph-check-circle text-2xl shrink-0 ml-2 text-emerald-500"></i>`;
            } else {
              btnClass = "bg-rose-50 border-rose-500 text-rose-700";
              iconHtml = `<i class="ph-fill ph-x-circle text-2xl shrink-0 ml-2 text-rose-500"></i>`;
            }
          } else if (state.selectedChoice && choice === currentQ.a) {
            btnClass = "bg-emerald-50 border-emerald-500 text-emerald-700 opacity-50";
          } else if (state.selectedChoice) {
            btnClass = "bg-gray-50 border-2 border-gray-200 text-gray-400 opacity-50";
          }

          return `
            <button ${state.selectedChoice !== null ? 'disabled' : ''} onclick="handleChoiceClick(${idx})"
              class="p-4 rounded-2xl font-bold text-lg sm:text-xl transition-all duration-200 ${btnClass} flex items-center justify-between active:scale-95 disabled:cursor-default disabled:active:scale-100"
            >
              <span class="text-left">${choice}</span>
              ${iconHtml}
            </button>
          `;
        }).join('');

        cardHtml = `
          <div class="w-full flex flex-col items-center justify-center h-full pt-4">
            <h2 class="text-lg sm:text-xl font-bold text-gray-800 mb-8 leading-relaxed">${currentQ.q}</h2>
            <div class="grid grid-cols-1 gap-3 w-full">${choicesHtml}</div>
          </div>
        `;
      } else {
        const questionText = isReverse ? currentQ.reverseQ : currentQ.q; 
        const answerText = isReverse ? currentQ.reverseA : currentQ.a;
        
        let answerArea = `<div class="mt-12 w-full"><p class="text-gray-400 text-sm mb-4 font-bold bg-gray-50 p-2 rounded-lg inline-block border border-gray-100">答えを頭に思い浮かべてから...</p></div>`;
        if (state.showAnswer) {
          answerArea = `
            <div class="mt-8 pt-8 border-t border-gray-100 w-full animate-fade-in">
              <p class="text-sm text-blue-500 mb-3 font-bold bg-blue-50 px-3 py-1 rounded-full inline-block border border-blue-100">答え</p>
              <p class="font-extrabold text-blue-600 text-2xl sm:text-3xl leading-relaxed">${answerText}</p>
            </div>
          `;
        }

        cardHtml = `
          <div class="w-full flex flex-col items-center justify-center h-full">
            <p class="text-sm text-gray-500 mb-6 font-bold bg-gray-100 px-3 py-1 rounded-md shadow-sm border border-gray-200">${isReverse ? 'これ、なんだっけ？（逆引き）' : '問題'}</p>
            <h2 class="font-bold text-gray-800 text-2xl sm:text-3xl leading-relaxed">${questionText}</h2>
            ${answerArea}
          </div>
        `;
      }

      let footerHtml = '';
      if (!isChoice) {
        if (!state.showAnswer) {
          footerHtml = `<button onclick="showAnswer()" class="w-full bg-gray-800 text-white font-bold text-lg p-5 rounded-2xl shadow-md hover:bg-gray-700 active:scale-95 transition-all">答えを見る</button>`;
        } else {
          footerHtml = `
            <div class="flex gap-4 animate-fade-in h-full">
              <button onclick="handleAnswer(false)" class="flex-1 bg-rose-100 text-rose-600 border-2 border-rose-200 font-bold text-lg p-4 rounded-2xl hover:bg-rose-200 active:scale-95 transition-all flex flex-col items-center justify-center shadow-sm">
                <i class="ph-fill ph-x text-2xl mb-1"></i><span class="text-sm">間違えた</span>
              </button>
              <button onclick="handleAnswer(true)" class="flex-1 bg-emerald-500 text-white font-bold text-lg p-4 rounded-2xl shadow-md hover:bg-emerald-600 active:scale-95 transition-all flex flex-col items-center justify-center">
                <i class="ph-fill ph-check text-2xl mb-1"></i><span class="text-sm">覚えた！</span>
              </button>
            </div>
          `;
        }
      }

      const isGuest = state.activeUser === 'guest';
      let headerStripes = '';
      if (isGuest) {
        headerStripes = '<div class="guest-stripes text-yellow-900 text-xs font-bold text-center py-1 absolute top-0 left-0 w-full z-50 shadow-sm">👻 現在ゲストモードです（成績は保存されません）</div>';
      } else if (state.activeUser === 'momoka') {
        headerStripes = '<div class="momoka-stripes text-rose-800 text-xs font-bold text-center py-1 absolute top-0 left-0 w-full z-50 shadow-sm border-b border-rose-200">🌺 ももかちゃんのアカウントで学習中</div>';
      } else {
        headerStripes = '<div class="sakura-stripes text-pink-800 text-xs font-bold text-center py-1 absolute top-0 left-0 w-full z-50 shadow-sm border-b border-pink-200">🌸 さくらちゃんのアカウントで学習中</div>';
      }

      return `
        <div class="max-w-xl mx-auto p-4 min-h-screen flex flex-col pt-6 pb-8 animate-fade-in relative z-10">
          ${headerStripes}
          <div class="mb-6 mt-4">
            <div class="flex justify-between items-end mb-3">
              <button onclick="handleInterrupt()" class="flex items-center justify-center p-2 rounded-xl bg-white/90 backdrop-blur-sm border border-gray-200 text-gray-500 hover:bg-white hover:text-gray-800 transition-colors shadow-sm">
                <i class="ph-fill ph-house text-lg mr-1"></i><span class="text-xs font-bold">中断</span>
              </button>
              <div class="text-right">
                <div class="text-gray-600 text-xs font-bold flex items-center justify-end mb-1 bg-white/70 backdrop-blur-sm px-2 py-1 rounded-md border border-gray-200 shadow-sm">
                  <i class="ph-fill ph-stack text-sm mr-1"></i>
                  ${currentQ.category} ${currentQ.isRetry ? '<span class="ml-1 text-rose-500 font-bold">(復習)</span>' : ''}
                </div>
                <span class="text-blue-600 bg-blue-100 px-3 py-1 rounded-full text-sm font-bold shadow-sm border border-blue-200">
                  ${state.currentIndex + 1} / ${totalCurrent}
                </span>
              </div>
            </div>
            <div class="h-3 w-full bg-white/60 backdrop-blur rounded-full overflow-hidden border border-gray-200 shadow-inner">
              <div class="h-full bg-blue-500 transition-all duration-300 ease-out shadow-sm" style="width: ${progressPercent}%"></div>
            </div>
          </div>
          <div class="flex-grow flex flex-col">
            <div class="bg-white/95 backdrop-blur-md p-6 sm:p-10 rounded-3xl shadow-xl border border-gray-100 flex-grow flex flex-col items-center justify-center text-center relative overflow-hidden">
              <div class="absolute top-4 left-4 bg-gray-100 text-gray-500 text-xs px-2 py-1 rounded-md font-bold uppercase tracking-wider border border-gray-200 shadow-sm">
                ${isChoice ? '4択問題' : isReverse ? '逆引き' : '通常'}
              </div>
              ${cardHtml}
            </div>
          </div>
          <div class="mt-6 mb-4 h-20">
            ${footerHtml}
          </div>
        </div>
      `;
    }

    function renderResultHTML() {
      const isPerfect = state.sessionStats.mistakes === 0; 
      const isGuest = state.activeUser === 'guest'; 
      const currentUserTheme = userThemes[state.activeUser] || userThemes['sakura'];

          <div class="bg-white/95 backdrop-blur-sm w-full p-6 rounded-3xl shadow-xl border border-gray-100 mb-8">

    function renderMessageHTML() {
      if (!state.message.show) return '';
      return `
        <div class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-[100] animate-fade-in p-4">
          <div class="bg-white p-6 sm:p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center border-4 border-white">
            <p class="text-gray-800 font-bold mb-6 text-base sm:text-lg whitespace-pre-wrap leading-relaxed">${state.message.text}</p>
            <div class="flex justify-center gap-4">
              ${state.message.type === 'confirm' ? `
                <button onclick="closeMessage()" class="flex-1 px-4 py-3 rounded-2xl bg-gray-100 text-gray-700 font-bold hover:bg-gray-200 transition-colors active:scale-95 border border-gray-200">やめる</button>
                <button onclick="confirmMessage()" class="flex-1 px-4 py-3 rounded-2xl bg-rose-500 text-white font-bold hover:bg-rose-600 transition-colors active:scale-95 shadow-md">はい</button>
              ` : `
                <button onclick="closeMessage()" class="w-full px-8 py-3 rounded-2xl bg-blue-500 text-white font-bold hover:bg-blue-600 transition-colors shadow-md active:scale-95">OK</button>
              `}
            </div>
          </div>
        </div>
      `;
    }

    function renderPinHTML() {
      if (!state.pin.show) return '';
      const theme = state.pin.targetUser ? userThemes[state.pin.targetUser] : userThemes[state.activeUser];
      const isSetup = state.pin.mode === 'setup';
      
      let dots = ''; 
      for(let i=0; i<4; i++) { 
        dots += `<div class="w-4 h-4 rounded-full border-2 ${theme.text} ${i < state.pin.value.length ? theme.activeBg : 'bg-transparent'} transition-all mx-1"></div>`; 
      }
      
      return `
        <div class="fixed inset-0 bg-black/40 backdrop-blur-sm flex flex-col items-center justify-center z-50 animate-fade-in px-4">
          <div class="bg-white/95 p-6 sm:p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center border-4 ${theme.name === 'さくら' ? 'border-pink-200' : 'border-rose-200'}">
            <div class="text-6xl mb-4 bg-gray-50 w-20 h-20 mx-auto rounded-full flex items-center justify-center shadow-inner border border-gray-100">${theme.icon}</div>
            <h3 class="font-bold text-xl text-gray-800 mb-2 bg-gray-100 py-1 px-3 rounded-lg inline-block border border-gray-200">${isSetup ? `${theme.name}の新しいパスワード` : `${theme.name}の部屋の鍵`}</h3>
            <p class="text-sm ${state.pin.error ? 'text-red-500 font-bold bg-red-50 py-1 rounded border border-red-100' : 'text-gray-500'} mb-6 mt-2">${state.pin.error ? '番号がちがうみたい！' : (isSetup ? '4つの数字を決めてね！' : 'パスワード(4桁)を入力してね')}</p>
            
            <div class="flex justify-center mb-8 bg-gray-50 py-3 rounded-2xl border border-gray-100 shadow-inner">
              ${dots}
            </div>
            
            <div class="grid grid-cols-3 gap-4 font-sans mb-4">
              ${[1,2,3,4,5,6,7,8,9].map(n => `
                <button onclick="inputPin('${n}')" class="w-16 h-16 rounded-full bg-white text-gray-700 text-2xl font-bold shadow-md hover:bg-gray-50 active:scale-95 transition-all mx-auto border border-gray-100">${n}</button>
              `).join('')}
              <button onclick="deletePin()" class="w-16 h-16 rounded-full bg-white text-gray-500 text-2xl flex items-center justify-center shadow-md hover:bg-gray-50 active:scale-95 transition-all mx-auto border border-gray-100"><i class="ph-fill ph-backspace"></i></button>

            ${isSetup && state.passwords && state.passwords[state.activeUser] ? `

              </button>
            ` : ''}
          </div>
        </div>

                  <path d="M 60,300 C 60,150 140,150 140,300 Z" fill="#e2e8f0" />
                  <path d="M 50,300 C 30,100 170,100 150,300 C 130,150 70,150 50,300 Z" fill="#0a0a0a" />

                  <circle class="s-eye" cx="115" cy="180" r="4" />

            </div>
          </div>
          <div class="relative z-50 flex flex-col items-center mt-10">
            <i class="ph-fill ph-skull text-6xl text-red-700 mb-6 ${level > 0 ? 'animate-pulse-red' : ''}"></i>
            <h3 class="${level >= 4 ? 'text-red-600 glitch-text' : 'text-red-600'} ${level >= 5 ? 'text-xl sm:text-2xl' : ''} font-bold tracking-[0.2em] sm:tracking-[0.3em] mb-8 font-serif whitespace-nowrap">
              ${level >= 5 ? '呪 ワ レ タ 呪 ワ レ タ' : (level >= 3 ? 'ウシロヲフリムクナ...' : 'パスコードヲ入力セヨ')}
            </h3>
            <div class="flex gap-3 mb-10">
              ${[0,1,2,3,4,5].map(i => `
                <div class="w-4 h-4 rounded-full border-2 border-red-900 ${state.passcodeValue.length > i ? 'bg-red-600 shadow-[0_0_10px_rgba(225,29,72,0.8)]' : 'bg-transparent'} transition-all"></div>
              `).join('')}
            </div>
            <div class="grid grid-cols-3 gap-4 w-64 max-w-full font-serif">
              ${[1,2,3,4,5,6,7,8,9].map(n => `
                <button onclick="inputPasscode('${n}')" class="w-16 h-16 rounded-full border border-red-900 text-red-500 text-2xl font-bold hover:bg-red-900/60 active:scale-95 transition-all mx-auto shadow-[0_0_15px_rgba(0,0,0,0.8)] bg-black/60 backdrop-blur-sm">${n}</button>
              `).join('')}
              <button onclick="deletePasscode()" class="w-16 h-16 rounded-full flex items-center justify-center border border-red-900 text-red-600 text-3xl hover:bg-red-900/60 active:scale-95 transition-all mx-auto shadow-[0_0_15px_rgba(0,0,0,0.8)] bg-black/60 backdrop-blur-sm"><i class="ph-fill ph-backspace"></i></button>
              <button onclick="inputPasscode('0')" class="w-16 h-16 rounded-full border border-red-900 text-red-500 text-2xl font-bold hover:bg-red-900/60 active:scale-95 transition-all mx-auto shadow-[0_0_15px_rgba(0,0,0,0.8)] bg-black/60 backdrop-blur-sm">0</button>
              <button onclick="closePasscode()" class="w-16 h-16 rounded-full border border-gray-800 text-gray-400 text-sm font-bold hover:text-gray-200 active:scale-95 transition-all mx-auto shadow-[0_0_15px_rgba(0,0,0,0.8)] bg-black/60 backdrop-blur-sm">戻る</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderParentDashboardHTML() {
      const userName = userThemes[state.activeUser] ? userThemes[state.activeUser].name : 'さくら'; 
      let totalAttempts = 0; 
      let totalMistakes = 0;
      
      const analyzedData = rawData.map(q => { 
        const stat = state.userStats[q.id] || { corrects: 0, mistakes: 0 }; 
        const total = stat.corrects + stat.mistakes; 
        totalAttempts += total; 
        totalMistakes += stat.mistakes; 
        return { ...q, stat, total, mistakeRate: total > 0 ? Math.round((stat.mistakes / total) * 100) : 0 }; 
      }).filter(q => q.total > 0).sort((a, b) => b.mistakeRate - a.mistakeRate || b.stat.mistakes - a.stat.mistakes);
      
      const accuracy = totalAttempts > 0 ? Math.round(((totalAttempts - totalMistakes) / totalAttempts) * 100) : 0;
      
      let listHtml = analyzedData.length === 0 
        ? `<p class="text-gray-500 text-center py-8 border border-gray-800 rounded-2xl">データが空じゃ。まずは解かせるのだ。</p>` 
        : analyzedData.slice(0, 10).map((item, idx) => `
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 flex items-start shadow-md">
              <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm mr-4 shrink-0 ${idx < 3 ? 'bg-red-900/50 text-red-500 border border-red-800' : 'bg-gray-700 text-gray-400'}">${idx + 1}</div>
              <div class="flex-grow">
                <span class="text-[10px] font-bold text-gray-400 border border-gray-600 px-2 py-1 rounded mb-2 inline-block">${item.category}</span>
                <p class="text-sm text-gray-200 font-bold mb-1 leading-snug">${item.q}</p>
                <p class="text-xs text-red-400 font-medium">答: ${item.a}</p>
              </div>
              <div class="shrink-0 text-right ml-2">
                <p class="text-red-500 font-bold text-lg">${item.mistakeRate}%</p>
                <p class="text-[10px] text-gray-500">ミス率</p>
              </div>
            </div>
          `).join('');
          
      return `
        <div class="fixed inset-0 min-h-screen bg-gray-950 text-gray-100 overflow-y-auto z-[60] animate-fade-in font-serif pb-20">
          <div class="max-w-2xl mx-auto p-4 sm:p-6">
            <div class="flex justify-between items-center mb-8 border-b border-red-900 pb-4 pt-4">
              <h1 class="text-2xl sm:text-3xl font-bold text-red-600 flex items-center tracking-widest">
                <i class="ph-fill ph-skull text-3xl sm:text-4xl mr-3"></i>閻魔の帳簿<span class="text-sm text-gray-400 ml-3 tracking-normal">(${userName}の記録)</span>
              </h1>
              <button onclick="goHome()" class="px-4 py-2 bg-gray-800 border border-gray-700 text-gray-400 rounded-lg hover:bg-gray-700 hover:text-white active:scale-95 transition-all text-sm font-bold">人間界へ戻る</button>
            </div>
            
            <div class="bg-gray-900 border-l-4 border-red-600 p-6 sm:p-8 rounded-r-2xl mb-10 relative shadow-[0_4px_20px_rgba(0,0,0,0.5)]">
              <i class="ph-fill ph-quotes text-5xl text-gray-800 absolute top-4 right-4"></i>
              <h2 class="text-red-500 font-bold mb-4 text-sm tracking-[0.2em] flex items-center">
                <i class="ph-fill ph-scroll text-lg mr-2"></i>大王の裁き（AI評価）
              </h2>
              <p class="text-gray-300 leading-loose whitespace-pre-wrap text-sm sm:text-base">${generateAiEvaluation()}</p>
            </div>
            
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-10">
              <div class="bg-gray-900 p-4 rounded-xl border border-gray-800 text-center shadow-inner">
                <p class="text-xs text-gray-500 mb-1 tracking-wider">総解答数</p><p class="text-2xl font-black text-gray-200">${totalAttempts}</p>
              </div>
              <div class="bg-gray-900 p-4 rounded-xl border border-gray-800 text-center shadow-inner">
                <p class="text-xs text-gray-500 mb-1 tracking-wider">正解数</p><p class="text-2xl font-black text-emerald-500">${totalAttempts - totalMistakes}</p>
              </div>
              <div class="bg-gray-900 p-4 rounded-xl border border-gray-800 text-center shadow-inner">
                <p class="text-xs text-gray-500 mb-1 tracking-wider">ミス回数</p><p class="text-2xl font-black text-red-600">${totalMistakes}</p>
              </div>
              <div class="bg-gray-900 p-4 rounded-xl border border-gray-800 text-center shadow-inner">
                <p class="text-xs text-gray-500 mb-1 tracking-wider">総合正答率</p><p class="text-2xl font-black text-blue-400">${accuracy}%</p>
              </div>
            </div>
            
            <div>
              <h3 class="text-lg font-bold text-gray-300 mb-4 flex items-center tracking-widest border-l-2 border-red-900 pl-3">
                <i class="ph-fill ph-warning text-xl mr-2 text-red-600"></i>罪深き問題リスト（苦手トップ）
              </h3>
              <div class="space-y-3">
                ${listHtml}
              </div>
            </div>
            
          </div>
        </div>
      `;
    }

    function render() {
      const root = document.getElementById('root');
      let html = '';
      if (state.screen === 'home') html = renderHomeHTML();
      else if (state.screen === 'quiz') html = renderQuizHTML();
      else if (state.screen === 'result') html = renderResultHTML();
      else if (state.screen === 'parent_dashboard') html = renderParentDashboardHTML();
      
      html += renderPinHTML(); 
      html += renderPasscodeHTML(); 
      html += renderMessageHTML();
      
      root.innerHTML = html;
    }

  </script>
</body>
</html>
