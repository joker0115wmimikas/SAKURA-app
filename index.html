<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>【最強】最強！暗記完璧最強アプリ(最強)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <!-- Firebase (安定のCompat版) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    
    @keyframes pulse-red {
      0%, 100% { filter: drop-shadow(0 0 5px rgba(225,29,72,0.5)); }
      50% { filter: drop-shadow(0 0 15px rgba(225,29,72,1)); }
    }
    .animate-pulse-red { animation: pulse-red 2s infinite; }
    
    .guest-stripes { background: repeating-linear-gradient(45deg, #f59e0b, #f59e0b 10px, #fbbf24 10px, #fbbf24 20px); }
    .momoka-stripes { background: repeating-linear-gradient(45deg, #fce7f3, #fce7f3 10px, #fdf2f8 10px, #fdf2f8 20px); }
    .sakura-stripes { background: repeating-linear-gradient(45deg, #fbcfe8, #fbcfe8 10px, #fdf2f8 10px, #fdf2f8 20px); }

    /* 🌸🌺 背景パーティクル（花びら）システム */
    #particles-container {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      pointer-events: none; z-index: -1; overflow: hidden;
    }
    .falling-particle { position: absolute; top: -5vh; }
    
    .particle-sakura {
      width: 12px; height: 16px;
      background: #fbcfe8; /* 桜色 */
      border-radius: 50% 0 50% 0; /* 桜の花びら風 */
      box-shadow: inset 2px -2px 4px rgba(255,192,203,0.5);
      animation: fall-sakura linear forwards;
    }
    @keyframes fall-sakura {
      0% { transform: translateY(0) rotate(0deg) translateX(0); }
      100% { transform: translateY(110vh) rotate(720deg) translateX(80px); }
    }

    .particle-momoka {
      width: 16px; height: 16px;
      background: #fca5a5; /* 桃色（少し濃いピンク） */
      border-radius: 50%; /* 丸い桃の花びら風 */
      box-shadow: inset -2px -2px 4px rgba(225,29,72,0.2);
      animation: fall-momoka linear forwards;
    }
    @keyframes fall-momoka {
      0% { transform: translateY(0) rotate(0deg) scale(1) translateX(0); }
      50% { transform: translateY(50vh) rotate(180deg) scale(0.8) translateX(-40px); }
      100% { transform: translateY(110vh) rotate(360deg) scale(1) translateX(30px); }
    }

    /* 👻 貞子アニメーションシステム */
    .well-container { position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%); width: 250px; height: 90px; z-index: 10; }
    .well-hole { width: 100%; height: 100%; background: radial-gradient(ellipse at center, #000 20%, #111 60%, #333 100%); border: 12px solid #2a2a2a; border-radius: 50%; box-shadow: 0 0 30px #000 inset, 0 10px 30px rgba(0,0,0,0.9); }
    .sadako-wrapper { position: absolute; bottom: 12%; left: 50%; width: 150px; height: 200px; margin-left: -75px; transform-origin: bottom center; transition: all 1.2s cubic-bezier(0.3, 0.1, 0.2, 1); z-index: 5; }
    .sadako-svg { width: 100%; height: 100%; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.8)); }
    .lvl-0 .sadako-wrapper { transform: translateY(180px) scale(0.3); opacity: 0; }
    .lvl-1 .sadako-wrapper { transform: translateY(80px) scale(0.8); opacity: 0.9; z-index: 15; }
    .lvl-2 .sadako-wrapper { transform: translateY(30px) scale(1.2); opacity: 1; z-index: 15; }
    .lvl-3 .sadako-wrapper { transform: translateY(-20px) scale(1.8); opacity: 1; z-index: 15; filter: drop-shadow(0 0 20px rgba(255,0,0,0.3)); }
    .lvl-4 .sadako-wrapper { transform: translateY(-80px) scale(3.5); opacity: 1; z-index: 40; filter: drop-shadow(0 0 40px rgba(255,0,0,0.5)); }
    .lvl-5 .sadako-wrapper { transform: translateY(-100px) scale(8); opacity: 1; z-index: 100; filter: drop-shadow(0 0 80px rgba(255,0,0,1)); animation: s-shake 0.05s infinite; }
    .s-eye { opacity: 0; transition: opacity 0.5s; }
    .lvl-5 .s-eye { opacity: 1; animation: s-blink 0.1s infinite; fill: #ff0000; filter: drop-shadow(0 0 10px red); }
    @keyframes s-shake { 0%, 100% { transform: translateY(-100px) scale(8) translateX(0); } 25% { transform: translateY(-100px) scale(8) translateX(-8px); } 50% { transform: translateY(-100px) scale(8) translateX(8px); } }
    @keyframes s-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .bg-cursed { animation: bg-flash 0.1s infinite alternate; }
    @keyframes bg-flash { from { background-color: #1a0000; } to { background-color: #800000; } }
    .glitch-text { animation: glitch-anim 0.1s infinite; color: #ff0000; text-shadow: 4px 0 #000, -4px 0 #000; font-weight: 900; letter-spacing: 0.1em; }
    @keyframes glitch-anim { 0% { transform: translate(0) skew(0deg); } 20% { transform: translate(-4px, 4px) skew(10deg); } 40% { transform: translate(-4px, -4px) skew(-10deg); } 60% { transform: translate(4px, 4px) skew(5deg); } 80% { transform: translate(4px, -4px) skew(-5deg); } 100% { transform: translate(0) skew(0deg); } }
  </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 selection:bg-blue-200">
  <!-- 花びらアニメーション用コンテナ -->
  <div id="particles-container"></div>
  
  <div id="root"></div>

  <script>
    // ==========================================
    // 📚 問題データ (全科目の超特大データベース: 約550問)
    // ==========================================
    let rawData = [
      { subject: "理科", category: "気体と水溶液", q: "水にとけにくい気体を集める方法", a: "水上置換法" },
      { subject: "理科", category: "気体と水溶液", q: "水にとけやすく、空気より密度が大きい気体を集める方法", a: "下方置換法" },
      { subject: "理科", category: "気体と水溶液", q: "水にとけやすく、空気より密度が小さい気体を集める方法", a: "上方置換法" },
      { subject: "理科", category: "気体と水溶液", q: "二酸化マンガンにうすい過酸化水素水を加えると発生する気体", a: "酸素" },
      { subject: "理科", category: "気体と水溶液", q: "石灰石にうすい塩酸を加えると発生する気体", a: "二酸化炭素" },
      { subject: "理科", category: "気体と水溶液", q: "塩化アンモニウムと水酸化カルシウムの混合物を加熱すると発生する気体", a: "アンモニア" },
      { subject: "理科", category: "気体と水溶液", q: "亜鉛や鉄などの金属にうすい塩酸を加えると発生する気体", a: "水素" },
      { subject: "理科", category: "気体と水溶液", q: "水に非常にとけやすく、特有の刺激臭がある気体", a: "アンモニア" },
      { subject: "理科", category: "気体と水溶液", q: "石灰水を白くにごらせる気体", a: "二酸化炭素" },
      { subject: "理科", category: "物質のすがた", q: "ガスバーナーで、炎の大きさを調節するねじ", a: "ガス調節ねじ" },
      { subject: "理科", category: "物質のすがた", q: "ガスバーナーで、炎を青くするために調節するねじ", a: "空気調節ねじ" },
      { subject: "理科", category: "光・音・力", q: "みずから光を発するもの", a: "光源" },
      { subject: "理科", category: "光・音・力", q: "光が鏡などの面にあたって、はね返る現象", a: "反射" },
      { subject: "理科", category: "光・音・力", q: "音源の振動の振れ幅。大きいほど音は大きくなる。", a: "振幅" },
      { subject: "理科", category: "光・音・力", q: "音源が1秒間に振動する回数。多いほど音は高くなる。", a: "振動数" },
      { subject: "理科", category: "大地の変化", q: "地球表面をおおう、厚さ数10〜約100kmのかたい板状の岩石", a: "プレート" },
      { subject: "理科", category: "地震", q: "地震の最初にくる小さなゆれ", a: "初期微動" },
      { subject: "理科", category: "地震", q: "初期微動を伝える速い波", a: "P波" },
      { subject: "理科", category: "地層と化石", q: "地層が堆積した当時の「環境」を推測できる化石", a: "示相化石" },
      { subject: "理科", category: "地層と化石", q: "地層が堆積した「時代」の推測に役立つ化石", a: "示準化石" },
      { subject: "社会", category: "歴史", q: "キリスト（イエス）が生まれたとされる年を基準とした年代の表し方", a: "西暦" },
      { subject: "社会", category: "歴史", q: "約700万年前にアフリカに現れた最古の人類", a: "猿人" },
      { subject: "社会", category: "歴史", q: "石を打ち砕いてつくった石器", a: "打製石器" },
      { subject: "社会", category: "歴史", q: "石を磨いてつくった石器", a: "磨製石器" },
      { subject: "社会", category: "歴史", q: "邪馬台国の女王で、中国の魏に使いを送った人物", a: "卑弥呼" },
      { subject: "社会", category: "歴史", q: "日本独特の古墳の形で、四角い方墳と円い円墳を合わせた形", a: "前方後円墳" },
      { subject: "社会", category: "地理", q: "地球表面の海と陸の面積の割合は、およそ何対何？", a: "7：3" },
      { subject: "社会", category: "地理", q: "大洋のなかで最も広い海洋", a: "太平洋" }
    ];

    const engVocab = {
      "新しい": "new", "速い": "fast", "古い": "old", "日本の": "Japanese",
      "素晴らしい": "great", "悪い": "bad", "親切な": "kind", "忙しい": "busy",
      "たくさんの": "many", "とても": "very", "上手に": "well", "本当に": "really",
      "明日": "tomorrow", "今日": "today", "昨日": "yesterday", "時間": "time",
      "歩く": "walk", "走る": "run", "泳ぐ": "swim", "行く": "go", "来る": "come"
    };

    Object.keys(engVocab).forEach(k => {
      rawData.push({ subject: "英語", category: "英単語", q: `「${k}」を意味する英単語は？`, a: engVocab[k] });
    });

    // 重複を排除し一意なIDを付与
    const uniqueMap = new Map();
    rawData.forEach((item, index) => {
      const key = item.subject + item.category + item.q + item.a;
      if(!uniqueMap.has(key)) uniqueMap.set(key, { ...item, id: 'q_' + index });
    });
    rawData = Array.from(uniqueMap.values());

    // ==========================================
    // アプリの状態管理（マルチユーザー＆パスワード対応）
    // ==========================================
    const state = {
      screen: 'home', 
      activeTab: 'study',
      activeUser: 'sakura', // sakura, momoka, guest
      user: null,
      userStats: {}, // 現在のユーザーの成績データ
      passwords: {}, // ユーザーごとのパスワード情報
      quizQueue: [],
      currentIndex: 0,
      showAnswer: false,
      selectedChoice: null,
      choiceResult: null,
      sessionStats: { totalInitial: 0, mistakes: 0 },
      isDataLoaded: false,
      fbReady: false,
      // 貞子パスコード用
      showPasscode: false,
      passcodeValue: '',
      passcodeErrorCount: 0,
      // 個別パスワードUI用
      pin: {
        show: false,
        mode: 'auth', // 'auth' (認証), 'setup' (設定)
        targetUser: null,
        value: '',
        error: false
      },
      // カスタムメッセージUI用
      message: {
        show: false,
        text: '',
        type: 'info', // 'info', 'confirm'
        onConfirm: null
      }
    };

    const subjects = [];
    const subsList = [...new Set(rawData.map(d => d.subject))];
    subsList.forEach(sub => {
      const categories = [...new Set(rawData.filter(d => d.subject === sub).map(d => d.category))];
      subjects.push({ name: sub, categories });
    });

    // ★ ユーザー別のテーマ情報（オシャレ演出追加）
    const userThemes = {
      sakura: { bg: 'bg-pink-100', text: 'text-pink-600', activeBg: 'bg-pink-500', activeText: 'text-white', icon: '🌸', name: 'さくら', particleClass: 'particle-sakura' },
      momoka: { bg: 'bg-rose-100', text: 'text-rose-600', activeBg: 'bg-rose-400', activeText: 'text-white', icon: '🌺', name: 'ももか', particleClass: 'particle-momoka' },
      guest: { bg: 'bg-yellow-100', text: 'text-yellow-600', activeBg: 'bg-yellow-500', activeText: 'text-white', icon: '👻', name: 'ゲスト', particleClass: '' }
    };

    // ==========================================
    // 背景パーティクル（花びら）アニメーション機能
    // ==========================================
    let particleInterval;
    function startParticles() {
      clearInterval(particleInterval);
      const container = document.getElementById('particles-container');
      if(!container) return;
      container.innerHTML = ''; // クリア
      
      const theme = userThemes[state.activeUser];
      if(!theme.particleClass) return; // ゲストは花びらなし
      
      // 定期的に花びらを生成
      particleInterval = setInterval(() => {
        const el = document.createElement('div');
        el.className = `falling-particle ${theme.particleClass}`;
        el.style.left = Math.random() * 100 + 'vw';
        // 落ちるスピードをランダムに
        el.style.animationDuration = (Math.random() * 5 + 5) + 's';
        // 透明度をランダムに
        el.style.opacity = Math.random() * 0.6 + 0.4;
        // 初期角度
        el.style.transform = `rotate(${Math.random() * 360}deg)`;
        
        container.appendChild(el);
        
        // アニメーションが終わったら消す
        setTimeout(() => { if(el.parentNode) el.remove(); }, 10000);
      }, 500); // 0.5秒ごとに生成
    }

    // ==========================================
    // Firebase 初期化 & データ読み込み
    // ==========================================
    const defaultAppId = "sakura-app-d3d10"; 
    const appId = (typeof __app_id !== 'undefined' && __app_id) ? __app_id : defaultAppId;
    
    let db;
    let auth;
    let fbUnsubscribe = null; 
    
    const initApp = async () => {
      try {
        let firebaseConfig = {
            apiKey: "AIzaSyCHGs5PHyfvW57SCJJi8GiDQ_ydH8M-5Vs",
            authDomain: "sakura-app-d3d10.firebaseapp.com",
            projectId: "sakura-app-d3d10",
            storageBucket: "sakura-app-d3d10.firebasestorage.app",
            messagingSenderId: "244016922212",
            appId: "1:244016922212:web:a1f1775a6a6aba2de8a971"
        };
        if (typeof __firebase_config !== 'undefined' && __firebase_config) {
          firebaseConfig = typeof __firebase_config === 'string' ? JSON.parse(__firebase_config) : __firebase_config;
        }
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        
        auth = firebase.auth();
        db = firebase.firestore();

        try {
          if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await auth.signInWithCustomToken(__initial_auth_token);
          } else {
            await auth.signInAnonymously();
          }
        } catch(e) {
          console.warn("Auth mode local fallback", e);
        }

        auth.onAuthStateChanged(user => {
          if (user) {
            state.user = user;
            state.fbReady = true;
            
            // ★ パスワード情報の読み込み
            const settingsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('settings').doc('passwords');
            settingsRef.onSnapshot(doc => {
              if(doc.exists) {
                state.passwords = doc.data() || {};
              } else {
                state.passwords = {};
              }
            });

            loadStatsForCurrentUser(); 
            startParticles(); // 花びら開始
          } else {
            state.isDataLoaded = true;
            render();
          }
        });

      } catch(e) {
        state.isDataLoaded = true;
        render();
      }
    };

    function loadStatsForCurrentUser() {
      if (fbUnsubscribe) {
        fbUnsubscribe(); 
        fbUnsubscribe = null;
      }
      
      state.userStats = {}; 
      state.isDataLoaded = false;

      if (state.activeUser === 'guest') {
        state.isDataLoaded = true;
        render();
        return;
      }

      if (state.fbReady && state.user) {
        try {
          const collectionName = state.activeUser === 'sakura' ? 'shared_stats' : 'shared_stats_momoka';
          const statsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection(collectionName);
          
          fbUnsubscribe = statsRef.onSnapshot(snapshot => {
             const stats = {};
             snapshot.forEach(doc => { stats[doc.id] = doc.data(); });
             state.userStats = stats;
             state.isDataLoaded = true;
             render();
           }, error => {
             state.isDataLoaded = true;
             render();
           });
        } catch(e) {
           state.isDataLoaded = true;
           render();
        }
      } else {
        state.isDataLoaded = true;
        render();
      }
    }

    initApp();

    // ==========================================
    // カスタムメッセージ UI関数 (alert/confirmの代わり)
    // ==========================================
    window.showMessage = function(text, type='info', onConfirm=null) {
      state.message = { show: true, text, type, onConfirm };
      render();
    }
    window.closeMessage = function() {
      state.message.show = false;
      render();
    }
    window.confirmMessage = function() {
      if(state.message.onConfirm) state.message.onConfirm();
      closeMessage();
    }

    // ==========================================
    // ★ 個別パスワード（暗証番号）ロジック
    // ==========================================
    window.switchUser = function(user) {
      if (state.activeUser === user) return;
      
      // パスワードが設定されているかチェック
      const requiredPass = state.passwords && state.passwords[user];
      
      if (requiredPass && user !== 'guest') {
        // ロック画面を表示
        state.pin = { show: true, mode: 'auth', targetUser: user, value: '', error: false };
        render();
        return;
      }
      
      // パスワード不要ならそのまま切り替え
      executeUserSwitch(user);
    }

    function executeUserSwitch(user) {
      state.activeUser = user;
      state.activeTab = 'study';
      state.pin.show = false;
      loadStatsForCurrentUser();
      startParticles(); // 花びら変更
      render();
    }

    window.openPinSetup = function() {
      state.pin = { show: true, mode: 'setup', targetUser: state.activeUser, value: '', error: false };
      render();
    }

    window.removePin = function() {
      showMessage(`${userThemes[state.activeUser].name}のパスワードを解除しますか？`, 'confirm', () => {
        const settingsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('settings').doc('passwords');
        // 対象ユーザーのパスワードフィールドを削除(nullで上書き)
        settingsRef.set({ [state.activeUser]: null }, { merge: true });
        state.pin.show = false;
        showMessage("パスワードを解除しました。");
      });
    }

    window.inputPin = function(num) {
      if (state.pin.value.length < 4) {
        state.pin.value += num;
        state.pin.error = false;
        render();
        
        if (state.pin.value.length === 4) {
          setTimeout(checkPin, 200); // 演出のため少し待つ
        }
      }
    }
    window.deletePin = function() {
      state.pin.value = state.pin.value.slice(0, -1);
      state.pin.error = false;
      render();
    }
    window.closePin = function() {
      state.pin.show = false;
      render();
    }

    function checkPin() {
      const { mode, targetUser, value } = state.pin;
      
      // 保護者用マスターパスワード
      const isMaster = (value === '1151'); 

      if (mode === 'auth') {
        const correctPass = state.passwords[targetUser];
        if (value === correctPass || isMaster) {
          executeUserSwitch(targetUser);
        } else {
          state.pin.error = true;
          state.pin.value = '';
          render();
        }
      } else if (mode === 'setup') {
        // 新しいパスワードを保存
        const settingsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('settings').doc('passwords');
        settingsRef.set({ [state.activeUser]: value }, { merge: true });
        
        state.pin.show = false;
        showMessage(`${userThemes[state.activeUser].name}のパスワードを設定しました！\n次回からアカウントを開くときに入力してね。`);
      }
    }

    // ==========================================
    // 学習ロジック
    // ==========================================
    function generateChoices(currentQuestion) {
      const sameSubjectData = rawData.filter(d => d.subject === currentQuestion.subject && d.a !== currentQuestion.a);
      const others = [...new Set(sameSubjectData.map(d => d.a))];
      const shuffledOthers = others.sort(() => 0.5 - Math.random()).slice(0, 3);
      return [currentQuestion.a, ...shuffledOthers].sort(() => 0.5 - Math.random());
    }

    window.switchTab = function(tab) { state.activeTab = tab; render(); }

    window.startQuiz = function(subject, category) {
      let filtered = rawData;
      if (subject) filtered = filtered.filter(q => q.subject === subject);
      if (category && category !== 'all') filtered = filtered.filter(q => q.category === category);
      prepareQuiz(filtered);
    }

    window.startWeaknessQuiz = function(subjectFilter = null) {
      if (state.activeUser === 'guest') {
        showMessage("ゲストモードでは苦手特訓は使えません。\nアカウントを選択してください。");
        return;
      }

      let targetQuestions = rawData.filter(q => {
        if (subjectFilter && q.subject !== subjectFilter) return false;
        const stat = state.userStats[q.id];
        if (!stat) return false;
        const total = stat.corrects + stat.mistakes;
        if (total === 0) return false;
        const mistakeRate = stat.mistakes / total;
        return mistakeRate >= 0.25 || stat.mistakes > stat.corrects;
      }).sort((a, b) => {
        const statA = state.userStats[a.id];
        const statB = state.userStats[b.id];
        const rateA = statA.mistakes / ((statA.corrects + statA.mistakes) || 1);
        const rateB = statB.mistakes / ((statB.corrects + statB.mistakes) || 1);
        return rateB - rateA;
      });

      if (targetQuestions.length === 0) {
        showMessage("すばらしい！この範囲の極端に苦手な問題はありません。\n通常学習を進めましょう！");
        return;
      }
      prepareQuiz(targetQuestions.slice(0, 20));
    }

    function prepareQuiz(questions) {
      const prepared = questions.map(q => {
        const rand = Math.random();
        let type = 'normal';
        if (rand < 0.4) type = 'choice'; 
        else if (rand < 0.7) type = 'reverse';
        
        let choices = [];
        if (type === 'choice') {
          choices = generateChoices(q);
        }
        return { ...q, queueId: Math.random().toString(36).substr(2, 9), quizType: type, choices, isRetry: false };
      }).sort(() => 0.5 - Math.random());

      state.quizQueue = prepared;
      state.currentIndex = 0;
      state.showAnswer = false;
      state.selectedChoice = null;
      state.choiceResult = null;
      state.sessionStats = { totalInitial: prepared.length, mistakes: 0 };
      state.screen = 'quiz';
      render();
    }

    window.handleInterrupt = function() { state.screen = 'home'; render(); }
    window.showAnswer = function() { state.showAnswer = true; render(); }

    window.handleAnswer = async function(isCorrect) {
      const currentQ = state.quizQueue[state.currentIndex];
      
      if (state.activeUser !== 'guest') {
        const currentStat = state.userStats[currentQ.id] || { corrects: 0, mistakes: 0 };
        const newData = {
          corrects: isCorrect ? currentStat.corrects + 1 : currentStat.corrects,
          mistakes: !isCorrect ? currentStat.mistakes + 1 : currentStat.mistakes,
          lastAttempt: new Date().toISOString()
        };
        state.userStats[currentQ.id] = newData; 

        if (state.user && state.fbReady) {
          try {
            const collectionName = state.activeUser === 'sakura' ? 'shared_stats' : 'shared_stats_momoka';
            const statRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection(collectionName).doc(currentQ.id);
            statRef.set(newData, { merge: true }).catch(() => {});
          } catch(e) {}
        }
      }

      if (!isCorrect) {
        state.quizQueue.push({ ...currentQ, queueId: Math.random().toString(36).substr(2, 9), isRetry: true });
        state.sessionStats.mistakes++;
      }

      if (state.currentIndex + 1 < state.quizQueue.length || !isCorrect) {
        state.currentIndex++;
        state.showAnswer = false;
        state.selectedChoice = null;
        state.choiceResult = null;
      } else {
        state.screen = 'result';
      }
      render();
    }

    window.handleChoiceClick = function(idx) {
      if (state.selectedChoice !== null) return;
      const currentQ = state.quizQueue[state.currentIndex];
      const choice = currentQ.choices[idx];
      const isCorrect = choice === currentQ.a;
      
      state.selectedChoice = choice;
      state.choiceResult = isCorrect ? 'correct' : 'wrong';
      render();
      setTimeout(() => { handleAnswer(isCorrect); }, 1200);
    }

    window.goHome = function() { state.screen = 'home'; render(); }

    function generateAiEvaluation() {
      let totalAttempts = 0;
      let totalMistakes = 0;
      let categoryStats = {};
      
      rawData.forEach(q => {
        if(!categoryStats[q.category]) categoryStats[q.category] = { attempts: 0, mistakes: 0, qs: [] };
        const stat = state.userStats[q.id];
        if (stat) {
          const attempts = stat.corrects + stat.mistakes;
          if (attempts > 0) {
            totalAttempts += attempts;
            totalMistakes += stat.mistakes;
            categoryStats[q.category].attempts += attempts;
            categoryStats[q.category].mistakes += stat.mistakes;
            categoryStats[q.category].qs.push({ q: q.q, mistakes: stat.mistakes });
          }
        }
      });

      const userName = userThemes[state.activeUser].name;

      if (totalAttempts === 0) return `なんじゃ、まだ一度もアプリを開いておらぬではないか！\n怠惰は最大の罪なり。まずは${userName}にアプリを開かせ、一問でも解かせるのじゃ！`;

      const accuracy = totalAttempts > 0 ? ((totalAttempts - totalMistakes) / totalAttempts) * 100 : 0;
      let evalText = `ふむ。我の帳簿によると、${userName}のこれまでの総解答数は【${totalAttempts}回】、正答率は【${Math.round(accuracy)}％】じゃな。\n\n`;

      if (accuracy >= 90) evalText += "見事な精進ぶりじゃ！地道な努力がしっかりと実を結んでおる。\nしかし、悪魔は油断した隙に忍び寄るもの。慢心せず、さらなる高みを目指させよ！\n";
      else if (accuracy >= 60) evalText += "まずまずの出来じゃな。努力の跡は見られるぞ。\nだが、まだ知識が定着しておらぬ部分がちらほら見受けられる。反復こそが記憶の定着への近道じゃ！\n";
      else evalText += "むむっ……これは少々苦戦しておるようじゃな。\n基礎がグラついておるかもしれんぞ。焦らず、一歩ずつ確実に理解させるのじゃ！\n";

      let worstCategory = null;
      let maxMistakeRate = -1;
      
      for (let cat in categoryStats) {
        const cStat = categoryStats[cat];
        if (cStat.attempts > 1) { 
          const rate = cStat.mistakes / cStat.attempts;
          if (rate > maxMistakeRate) { maxMistakeRate = rate; worstCategory = cat; }
        }
      }
      if (!worstCategory) {
        for (let cat in categoryStats) {
          const cStat = categoryStats[cat];
          if (cStat.attempts > 0) {
            const rate = cStat.mistakes / cStat.attempts;
            if (rate > maxMistakeRate) { maxMistakeRate = rate; worstCategory = cat; }
          }
        }
      }

      if (worstCategory && maxMistakeRate > 0) {
        evalText += `\nとくに、【${worstCategory}】の分野に深い闇（弱点）を感じるぞ……。`;
        const worstQs = categoryStats[worstCategory].qs.sort((a,b) => b.mistakes - a.mistakes);
        if(worstQs.length > 0 && worstQs[0].mistakes > 0) {
           evalText += `\nたとえば「${worstQs[0].q.substring(0, 15)}...」といった問題を何度も間違えておるようじゃ。\nこの辺りを重点的に復習させるのが点数アップへの道標じゃ！`;
        }
      } else {
         evalText += `\n今のところ、極端に苦手な深淵は見当たらぬ。この調子で満遍なく学習を続けるがよい！`;
      }
      return evalText;
    }

          `}

          <div class="flex bg-gray-200/80 backdrop-blur-sm p-1 rounded-xl mb-8 relative z-10">
            <button onclick="switchTab('study')" class="flex-1 py-3 text-sm font-bold rounded-lg transition-all ${state.activeTab === 'study' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'}">
              学習する
            </button>
            <button onclick="switchTab('analytics')" class="flex-1 py-3 text-sm font-bold rounded-lg transition-all ${state.activeTab === 'analytics' ? 'bg-white shadow-sm text-purple-600' : 'text-gray-500'}">
              データと分析
            </button>
          </div>
          ${contentHtml}
          
          <div class="mt-20 text-center relative z-10">
            <button onclick="openPasscode()" class="inline-flex flex-col items-center justify-center text-gray-400 hover:text-red-800 transition-all opacity-30 hover:opacity-100 group">
              <i class="ph-fill ph-skull text-3xl mb-1 group-hover:animate-pulse-red"></i>
              <span class="text-[10px] font-bold tracking-widest">深淵は見ている</span>
            </button>
          </div>
        </div>
      `;
    }

    function renderQuizHTML() {
      const currentQ = state.quizQueue[state.currentIndex];
      if (!currentQ) return '';

      const isChoice = currentQ.quizType === 'choice';
      const isReverse = currentQ.quizType === 'reverse';
      const totalCurrent = state.quizQueue.length;
      const progressPercent = (state.currentIndex / totalCurrent) * 100;

      let cardHtml = '';

      if (isChoice) {
        const choicesHtml = currentQ.choices.map((choice, idx) => {
          let btnClass = "bg-gray-50 border-2 border-gray-200 text-gray-700 hover:bg-blue-50 hover:border-blue-300";
          let iconHtml = "";

          if (state.selectedChoice === choice) {
            if (state.choiceResult === 'correct') {
              btnClass = "bg-emerald-50 border-emerald-500 text-emerald-700";
              iconHtml = `<i class="ph-fill ph-check-circle text-2xl shrink-0 ml-2 text-emerald-500"></i>`;
            } else {
              btnClass = "bg-rose-50 border-rose-500 text-rose-700";
              iconHtml = `<i class="ph-fill ph-x-circle text-2xl shrink-0 ml-2 text-rose-500"></i>`;
            }
          } else if (state.selectedChoice && choice === currentQ.a) {
            btnClass = "bg-emerald-50 border-emerald-500 text-emerald-700 opacity-50";
          } else if (state.selectedChoice) {
            btnClass = "bg-gray-50 border-2 border-gray-200 text-gray-400 opacity-50";
          }

          return `
            <button ${state.selectedChoice !== null ? 'disabled' : ''} onclick="handleChoiceClick(${idx})"
              class="p-4 rounded-2xl font-bold text-lg sm:text-xl transition-all duration-200 ${btnClass} flex items-center justify-between active:scale-95 disabled:cursor-default disabled:active:scale-100"
            >
              <span class="text-left">${choice}</span>
              ${iconHtml}
            </button>
          `;
        }).join('');

        cardHtml = `
          <div class="w-full flex flex-col items-center justify-center h-full pt-4">
            <h2 class="text-lg sm:text-xl font-bold text-gray-800 mb-8 leading-relaxed">${currentQ.q}</h2>
            <div class="grid grid-cols-1 gap-3 w-full">${choicesHtml}</div>
          </div>
        `;
      } else {
        const questionText = isReverse ? currentQ.a : currentQ.q;
        const answerText = isReverse ? currentQ.q : currentQ.a;
        const titleText = isReverse ? 'これは何の説明？' : '問題';
        
        let answerArea = `<div class="mt-12 w-full"><p class="text-gray-400 text-sm mb-4">答えを頭に思い浮かべてから...</p></div>`;
        if (state.showAnswer) {
          answerArea = `
            <div class="mt-8 pt-8 border-t border-gray-100 w-full animate-fade-in">
              <p class="text-sm text-blue-500 mb-3 font-medium">答え</p>
              <p class="font-extrabold text-blue-600 ${isReverse ? 'text-xl sm:text-2xl leading-relaxed' : 'text-3xl'}">${answerText}</p>
            </div>
          `;
        }

        cardHtml = `
          <div class="w-full flex flex-col items-center justify-center h-full">
            <p class="text-sm text-gray-500 mb-6 font-medium">${titleText}</p>
            <h2 class="font-bold text-gray-800 ${isReverse ? 'text-3xl' : 'text-xl sm:text-2xl leading-relaxed'}">${questionText}</h2>
            ${answerArea}
          </div>
        `;
      }

      let footerHtml = '';
      if (!isChoice) {
        if (!state.showAnswer) {
          footerHtml = `<button onclick="showAnswer()" class="w-full bg-gray-800 text-white font-bold text-lg p-5 rounded-2xl shadow-md hover:bg-gray-700 active:scale-95 transition-all">答えを見る</button>`;
        } else {
          footerHtml = `
            <div class="flex gap-4 animate-fade-in h-full">
              <button onclick="handleAnswer(false)" class="flex-1 bg-rose-100 text-rose-600 border-2 border-rose-200 font-bold text-lg p-4 rounded-2xl hover:bg-rose-200 active:scale-95 transition-all flex flex-col items-center justify-center">
                <i class="ph-fill ph-x text-2xl mb-1"></i><span class="text-sm">間違えた</span>
              </button>
              <button onclick="handleAnswer(true)" class="flex-1 bg-emerald-500 text-white font-bold text-lg p-4 rounded-2xl shadow-md hover:bg-emerald-600 active:scale-95 transition-all flex flex-col items-center justify-center">
                <i class="ph-fill ph-check text-2xl mb-1"></i><span class="text-sm">覚えた！</span>
              </button>
            </div>
          `;
        }
      }

      const isGuest = state.activeUser === 'guest';
      
      let headerStripes = '';
      if (isGuest) {
        headerStripes = '<div class="guest-stripes text-yellow-900 text-xs font-bold text-center py-1 absolute top-0 left-0 w-full z-50">👻 現在ゲストモードです（成績は保存されません）</div>';
      } else if (state.activeUser === 'momoka') {
        headerStripes = '<div class="momoka-stripes text-rose-800 text-xs font-bold text-center py-1 absolute top-0 left-0 w-full z-50">🌺 ももかちゃんのアカウントで学習中</div>';
      } else {
        headerStripes = '<div class="sakura-stripes text-pink-800 text-xs font-bold text-center py-1 absolute top-0 left-0 w-full z-50">🌸 さくらちゃんのアカウントで学習中</div>';
      }

      return `
        <div class="max-w-xl mx-auto p-4 min-h-screen flex flex-col pt-6 pb-8 animate-fade-in relative z-10">
          ${headerStripes}
          <div class="mb-6 mt-4">
            <div class="flex justify-between items-end mb-3">
              <button onclick="handleInterrupt()" class="flex items-center justify-center p-2 rounded-xl bg-white/90 backdrop-blur-sm border border-gray-200 text-gray-500 hover:bg-white hover:text-gray-800 transition-colors shadow-sm">
                <i class="ph-fill ph-house text-lg mr-1"></i><span class="text-xs font-bold">中断</span>
              </button>
              <div class="text-right">
                <div class="text-gray-600 text-xs font-bold flex items-center justify-end mb-1 bg-white/50 px-2 py-1 rounded-md">
                  <i class="ph-fill ph-stack text-sm mr-1"></i>
                  ${currentQ.category} ${currentQ.isRetry ? '<span class="ml-1 text-rose-500 font-bold">(復習)</span>' : ''}
                </div>
                <span class="text-blue-600 bg-blue-100 px-3 py-1 rounded-full text-sm font-bold shadow-sm">
                  ${state.currentIndex + 1} / ${totalCurrent}
                </span>
              </div>
            </div>
            <div class="h-3 w-full bg-white/60 backdrop-blur rounded-full overflow-hidden border border-gray-200">
              <div class="h-full bg-blue-500 transition-all duration-300 ease-out" style="width: ${progressPercent}%"></div>
            </div>
          </div>
          <div class="flex-grow flex flex-col">
            <div class="bg-white/95 backdrop-blur-md p-6 sm:p-10 rounded-3xl shadow-lg border border-gray-100 flex-grow flex flex-col items-center justify-center text-center relative overflow-hidden">
              <div class="absolute top-4 left-4 bg-gray-100 text-gray-500 text-xs px-2 py-1 rounded-md font-bold uppercase tracking-wider">
                ${isChoice ? '4択問題' : isReverse ? '逆引き' : '通常'}
              </div>
              ${cardHtml}
            </div>
          </div>
          <div class="mt-6 mb-4 h-20">
            ${footerHtml}
          </div>
        </div>
      `;
    }

    function renderResultHTML() {
      const isPerfect = state.sessionStats.mistakes === 0;
      const isGuest = state.activeUser === 'guest';
      const currentUserTheme = userThemes[state.activeUser];

      return `
        <div class="max-w-md mx-auto p-6 min-h-screen flex flex-col items-center justify-center text-center animate-fade-in relative z-10">
          <div class="w-24 h-24 ${currentUserTheme.bg} rounded-full flex items-center justify-center mb-6 shadow-inner mt-8 bg-opacity-90 backdrop-blur">
            <span class="text-5xl">${currentUserTheme.icon}</span>
          </div>
          <h1 class="text-3xl font-extrabold text-gray-800 mb-2">コンプリート！</h1>
          <p class="text-gray-600 mb-8 font-bold">${isGuest ? '<span class="text-yellow-600">※ゲストモードのためデータは保存されません</span>' : `${currentUserTheme.name}のデータとして保存しました！`}</p>
          
          <div class="bg-white/95 backdrop-blur-sm w-full p-6 rounded-3xl shadow-lg border border-gray-100 mb-8">
            <h3 class="text-sm text-gray-500 font-bold mb-4 uppercase tracking-wider">今回のセッション記録</h3>
            <div class="flex justify-around">
              <div class="text-center">
                <p class="text-3xl font-black text-gray-800">${state.sessionStats.totalInitial}</p>
                <p class="text-xs text-gray-500 mt-1 font-bold">出題数</p>
              </div>
              <div class="w-px bg-gray-200"></div>
              <div class="text-center">
                <p class="text-3xl font-black text-rose-500">${state.sessionStats.mistakes}</p>
                <p class="text-xs text-gray-500 mt-1 font-bold">やり直し回数</p>
              </div>
            </div>
            ${isPerfect ? `
              <div class="mt-6 bg-emerald-50 text-emerald-700 p-3 rounded-xl text-sm font-bold flex items-center justify-center border border-emerald-200">
                <i class="ph-fill ph-check-circle text-xl mr-2"></i>一発クリア！完璧です！
              </div>
            ` : ''}
          </div>
          <button onclick="goHome()" class="flex items-center justify-center w-full bg-gray-800 text-white font-bold text-lg p-5 rounded-2xl shadow-xl hover:bg-gray-700 active:scale-95 transition-all">
            <i class="ph ph-arrow-counter-clockwise text-xl mr-2"></i>ホームに戻る
          </button>
        </div>
      `;
    }

    function renderPasscodeHTML() {
      if(!state.showPasscode) return '';
      const level = Math.min(state.passcodeErrorCount, 5);
      
      const bgClass = level >= 5 ? 'bg-cursed' : 'bg-black/95';
      let textTitle = 'パスコードヲ入力セヨ';
      let titleClass = 'text-red-600';
      
      if (level >= 3 && level < 5) textTitle = 'ウシロヲフリムクナ...';
      if (level >= 4) titleClass = 'text-red-600 glitch-text';
      if (level >= 5) {
        textTitle = '呪 ワ レ タ 呪 ワ レ タ';
        titleClass = 'text-red-600 glitch-text text-xl sm:text-2xl';
      }

      return `
        <div class="fixed inset-0 ${bgClass} flex flex-col items-center justify-center z-50 animate-fade-in px-4 transition-colors duration-1000 overflow-hidden">
            <div class="absolute inset-0 pointer-events-none z-0 flex flex-col justify-end items-center overflow-hidden">
               <div class="relative w-full h-[400px] flex justify-center">
                 <div class="sadako-body lvl-${level}">
                   <svg viewBox="0 0 200 300" class="sadako-svg">
                     <path d="M 50,300 L 10,200 L 30,190 L 60,300 Z" fill="#94a3b8" />
                     <path d="M 150,300 L 190,200 L 170,190 L 140,300 Z" fill="#94a3b8" />
                     <path d="M 10,200 Q 5,180 20,180 Q 30,180 30,190 Z" fill="#e2e8f0" />
                     <path d="M 190,200 Q 195,180 180,180 Q 170,180 170,190 Z" fill="#e2e8f0" />
                     <path d="M 60,300 C 60,150 140,150 140,300 Z" fill="#e2e8f0" />
                     <path d="M 50,300 C 30,100 170,100 150,300 C 130,150 70,150 50,300 Z" fill="#0a0a0a" />
                     <circle class="s-eye" cx="85" cy="180" r="4" />
                     <circle class="s-eye" cx="115" cy="180" r="4" />
                   </svg>
                 </div>
                 <div class="well-container">
                    <div class="well-hole"></div>
                 </div>
               </div>
            </div>

            <div class="relative z-50 flex flex-col items-center mt-10">
              <i class="ph-fill ph-skull text-6xl text-red-700 mb-6 ${level > 0 ? 'animate-pulse-red' : ''}"></i>
              <h3 class="${titleClass} font-bold tracking-[0.2em] sm:tracking-[0.3em] mb-8 font-serif whitespace-nowrap">${textTitle}</h3>
              
              <div class="flex gap-3 mb-10">
                  ${[0,1,2,3,4,5].map(i => `
                      <div class="w-4 h-4 rounded-full border-2 border-red-900 ${state.passcodeValue.length > i ? 'bg-red-600 shadow-[0_0_10px_rgba(225,29,72,0.8)]' : 'bg-transparent'} transition-all"></div>
                  `).join('')}
              </div>

              <div class="grid grid-cols-3 gap-4 w-64 max-w-full font-serif">
                  ${[1,2,3,4,5,6,7,8,9].map(n => `<button onclick="inputPasscode('${n}')" class="w-16 h-16 rounded-full border border-red-900 text-red-500 text-2xl font-bold hover:bg-red-900/60 active:scale-95 transition-all mx-auto shadow-[0_0_15px_rgba(0,0,0,0.8)] bg-black/60 backdrop-blur-sm">${n}</button>`).join('')}
                  <button onclick="deletePasscode()" class="w-16 h-16 rounded-full flex items-center justify-center border border-red-900 text-red-600 text-3xl hover:bg-red-900/60 active:scale-95 transition-all mx-auto shadow-[0_0_15px_rgba(0,0,0,0.8)] bg-black/60 backdrop-blur-sm"><i class="ph-fill ph-backspace"></i></button>
                  <button onclick="inputPasscode('0')" class="w-16 h-16 rounded-full border border-red-900 text-red-500 text-2xl font-bold hover:bg-red-900/60 active:scale-95 transition-all mx-auto shadow-[0_0_15px_rgba(0,0,0,0.8)] bg-black/60 backdrop-blur-sm">0</button>
                  <button onclick="closePasscode()" class="w-16 h-16 rounded-full border border-gray-800 text-gray-400 text-sm font-bold hover:text-gray-200 active:scale-95 transition-all mx-auto shadow-[0_0_15px_rgba(0,0,0,0.8)] bg-black/60 backdrop-blur-sm">戻る</button>
              </div>
            </div>
        </div>
      `;
    }

    function renderParentDashboardHTML() {
      const userName = userThemes[state.activeUser].name;
      let totalAttempts = 0;
      let totalMistakes = 0;
      const analyzedData = rawData.map(q => {
        const stat = state.userStats[q.id] || { corrects: 0, mistakes: 0 };
        const total = stat.corrects + stat.mistakes;
        totalAttempts += total;
        totalMistakes += stat.mistakes;
        const mistakeRate = total > 0 ? Math.round((stat.mistakes / total) * 100) : 0;
        return { ...q, stat, total, mistakeRate };
      }).filter(q => q.total > 0);

      const accuracy = totalAttempts > 0 ? Math.round(((totalAttempts - totalMistakes) / totalAttempts) * 100) : 0;
      const sortedByMistake = [...analyzedData].sort((a, b) => {
        if (b.mistakeRate !== a.mistakeRate) return b.mistakeRate - a.mistakeRate;
        return b.stat.mistakes - a.stat.mistakes;
      });

      let listHtml = sortedByMistake.length === 0 
        ? `<p class="text-gray-500 text-center py-8 border border-gray-800 rounded-2xl">データが空じゃ。まずは解かせるのだ。</p>`
        : sortedByMistake.slice(0, 10).map((item, idx) => `
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 flex items-start shadow-md">
              <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm mr-4 shrink-0 ${idx < 3 ? 'bg-red-900/50 text-red-500 border border-red-800' : 'bg-gray-700 text-gray-400'}">
                ${idx + 1}
              </div>
              <div class="flex-grow">
                <span class="text-[10px] font-bold text-gray-400 border border-gray-600 px-2 py-1 rounded mb-2 inline-block">${item.category}</span>
                <p class="text-sm text-gray-200 font-bold mb-1 leading-snug">${item.q}</p>
                <p class="text-xs text-red-400 font-medium">答: ${item.a}</p>
              </div>
              <div class="shrink-0 text-right ml-2">
                <p class="text-red-500 font-bold text-lg">${item.mistakeRate}%</p>
                <p class="text-[10px] text-gray-500">ミス率</p>
              </div>
            </div>
          `).join('');

      return `
        <div class="fixed inset-0 min-h-screen bg-gray-950 text-gray-100 overflow-y-auto z-[60] animate-fade-in font-serif pb-20">
          <div class="max-w-2xl mx-auto p-4 sm:p-6">
            <div class="flex justify-between items-center mb-8 border-b border-red-900 pb-4 pt-4">
              <h1 class="text-2xl sm:text-3xl font-bold text-red-600 flex items-center tracking-widest">
                <i class="ph-fill ph-skull text-3xl sm:text-4xl mr-3"></i>閻魔の帳簿<span class="text-sm text-gray-400 ml-3 tracking-normal">(${userName}の記録)</span>
              </h1>
              <button onclick="goHome()" class="px-4 py-2 bg-gray-800 border border-gray-700 text-gray-400 rounded-lg hover:bg-gray-700 hover:text-white active:scale-95 transition-all text-sm font-bold">
                人間界へ戻る
              </button>
            </div>
            <div class="bg-gray-900 border-l-4 border-red-600 p-6 sm:p-8 rounded-r-2xl mb-10 relative shadow-[0_4px_20px_rgba(0,0,0,0.5)]">
              <i class="ph-fill ph-quotes text-5xl text-gray-800 absolute top-4 right-4"></i>
              <h2 class="text-red-500 font-bold mb-4 text-sm tracking-[0.2em] flex items-center">
                <i class="ph-fill ph-scroll text-lg mr-2"></i>大王の裁き（AI評価）
              </h2>
              <p class="text-gray-300 leading-loose whitespace-pre-wrap text-sm sm:text-base">${generateAiEvaluation()}</p>
            </div>
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-10">
              <div class="bg-gray-900 p-4 rounded-xl border border-gray-800 text-center shadow-inner">
                <p class="text-xs text-gray-500 mb-1 tracking-wider">総解答数</p>
                <p class="text-2xl font-black text-gray-200">${totalAttempts}</p>
              </div>
              <div class="bg-gray-900 p-4 rounded-xl border border-gray-800 text-center shadow-inner">
                <p class="text-xs text-gray-500 mb-1 tracking-wider">正解数</p>
                <p class="text-2xl font-black text-emerald-500">${totalAttempts - totalMistakes}</p>
              </div>
              <div class="bg-gray-900 p-4 rounded-xl border border-gray-800 text-center shadow-inner">
                <p class="text-xs text-gray-500 mb-1 tracking-wider">ミス回数</p>
                <p class="text-2xl font-black text-red-600">${totalMistakes}</p>
              </div>
              <div class="bg-gray-900 p-4 rounded-xl border border-gray-800 text-center shadow-inner">
                <p class="text-xs text-gray-500 mb-1 tracking-wider">総合正答率</p>
                <p class="text-2xl font-black text-blue-400">${accuracy}%</p>
              </div>
            </div>
            <div>
              <h3 class="text-lg font-bold text-gray-300 mb-4 flex items-center tracking-widest border-l-2 border-red-900 pl-3">
                <i class="ph-fill ph-warning text-xl mr-2 text-red-600"></i>罪深き問題リスト（苦手トップ）
              </h3>
              <div class="space-y-3">${listHtml}</div>
            </div>
          </div>
        </div>
      `;
    }

    function render() {
      const root = document.getElementById('root');
      let html = '';
      if (state.screen === 'home') html = renderHomeHTML();
      else if (state.screen === 'quiz') html = renderQuizHTML();
      else if (state.screen === 'result') html = renderResultHTML();
      else if (state.screen === 'parent_dashboard') html = renderParentDashboardHTML();
      
      html += renderPinHTML(); // 個別パスワード画面
      html += renderPasscodeHTML(); // 貞子画面
      html += renderMessageHTML(); // メッセージポップアップ
      
      root.innerHTML = html;
    }

  </script>
</body>
</html>
