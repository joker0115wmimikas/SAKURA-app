      { id: "q_027", subject: "理科", category: "地層と化石", q: "岩石が、太陽の熱や水のはたらきによって、長い間にくずれたりとかされたりすること", a: "風化" },
      { id: "q_028", subject: "理科", category: "地層と化石", q: "流水が岩石をけずりとるはたらき", a: "侵食" },
      { id: "q_029", subject: "理科", category: "地層と化石", q: "流水が土砂を運ぶはたらき", a: "運搬" },

      { id: "q_031", subject: "理科", category: "地層と化石", q: "離れた地層を比べるときに目印として利用できる層（火山灰の層など）", a: "かぎ層" },

      { id: "q_036", subject: "理科", category: "地層と化石", q: "生物の遺骸などでできており、うすい塩酸をかけると二酸化炭素が発生する岩石", a: "石灰岩" },

      { id: "q_054", subject: "理科", category: "地層と化石", q: "サンゴの化石が見つかった地層は、当時どのような環境だったと推測できるか", a: "あたたかくて浅い海" },
      { id: "q_055", subject: "理科", category: "地層と化石", q: "ブナの葉の化石が見つかった地層は、当時どのような環境だったと推測できるか", a: "やや寒冷な気候の陸地" },
      { id: "q_056", subject: "理科", category: "地層と化石", q: "フズリナや三葉虫は、どの地質年代の示準化石か", a: "古生代" },
      { id: "q_057", subject: "理科", category: "地層と化石", q: "アンモナイトや恐竜は、どの地質年代の示準化石か", a: "中生代" },
      { id: "q_058", subject: "理科", category: "地層と化石", q: "ビカリアやマンモス、ナウマンゾウは、どの地質年代の示準化石か", a: "新生代" },
      { id: "q_059", subject: "理科", category: "地層と化石", q: "地下の様子を探るために、細長い管を地中に打ち込んで土砂を引き上げる調査", a: "ボーリング調査" },
      { id: "q_060", subject: "理科", category: "地層と化石", q: "断層などの活動を調べるために、地表に溝を掘る調査", a: "トレンチ調査" },
      { id: "q_061", subject: "理科", category: "地層と化石", q: "れき・砂・泥のうち、粒の大きさが最も小さいものはどれか", a: "泥" },
      { id: "q_062", subject: "理科", category: "地層と化石", q: "れき・砂・泥のうち、粒の大きさが最も大きいものはどれか", a: "れき" }
    ];

    // ==========================================
    // アプリの状態（変数）
    // ==========================================
    const state = {
      screen: 'home', // 'home', 'quiz', 'result'
      activeTab: 'study', // 'study', 'analytics'
      user: null,
      userStats: {},
      quizQueue: [],
      currentIndex: 0,
      showAnswer: false,
      selectedChoice: null,
      choiceResult: null,
      sessionStats: { totalInitial: 0, mistakes: 0 },
      isDataLoaded: false,
      fbReady: false
    };

    // カテゴリー一覧の作成
    const subjects = [];
    const subsList = [...new Set(rawData.map(d => d.subject))];
    subsList.forEach(sub => {
      const categories = [...new Set(rawData.filter(d => d.subject === sub).map(d => d.category))];
      subjects.push({ name: sub, categories });
    });

    // ==========================================
    // Firebase 初期化
    // ==========================================
    let firebaseConfig;
    if (typeof __firebase_config !== 'undefined') {
      firebaseConfig = JSON.parse(__firebase_config);
    } else {
      // ▼▼▼ あなたの設定 ▼▼▼
      firebaseConfig = {
        apiKey: "AIzaSyCHGs5PHyfvW57SCJJi8GiDQ_ydH8M-5Vs",
        authDomain: "sakura-app-d3d10.firebaseapp.com",
        projectId: "sakura-app-d3d10",
        storageBucket: "sakura-app-d3d10.firebasestorage.app",
        messagingSenderId: "244016922212",
        appId: "1:244016922212:web:a1f1775a6a6aba2de8a971"
      };
    }
    const appId = (typeof __app_id !== 'undefined') ? __app_id : "sakura-app-d3d10";

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ログイン処理
    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
      auth.signInWithCustomToken(__initial_auth_token).catch(e => console.error(e));
    } else {
      auth.signInAnonymously().catch(e => console.error(e));
    }

    // データ監視
    auth.onAuthStateChanged(user => {
      state.user = user;
      state.fbReady = true;
      if (user) {
        db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('stats')
          .onSnapshot(snapshot => {
            const stats = {};
            snapshot.forEach(doc => { stats[doc.id] = doc.data(); });
            state.userStats = stats;
            state.isDataLoaded = true;
            render();
          });
      } else {
        state.isDataLoaded = true;
        render();
      }
    });

    // ==========================================
    // アプリの機能（関数）
    // ==========================================
    function generateChoices(correctAnswer) {
      const others = [...new Set(rawData.filter(d => d.a !== correctAnswer).map(d => d.a))];
      const shuffledOthers = others.sort(() => 0.5 - Math.random()).slice(0, 3);
      return [correctAnswer, ...shuffledOthers].sort(() => 0.5 - Math.random());
    }

    window.switchTab = function(tab) {
      state.activeTab = tab;
      render();
    }

    window.startQuiz = function(subject, category) {
      let filtered = rawData;
      if (subject) filtered = filtered.filter(q => q.subject === subject);
      if (category && category !== 'all') filtered = filtered.filter(q => q.category === category);
      prepareQuiz(filtered);
    }

    window.startWeaknessQuiz = function() {
      const weakQuestions = rawData.filter(q => {
        const stat = state.userStats[q.id];
        return stat && stat.mistakes > 0;
      }).sort((a, b) => {
        const statA = state.userStats[a.id];
        const statB = state.userStats[b.id];
        const rateA = statA.mistakes / ((statA.corrects + statA.mistakes) || 1);
        const rateB = statB.mistakes / ((statB.corrects + statB.mistakes) || 1);
        return rateB - rateA;
      });

      if (weakQuestions.length === 0) {
        alert("すばらしい！現在、記録されている苦手な問題はありません。通常学習を進めましょう！");
        return;
      }

      prepareQuiz(weakQuestions.slice(0, 20));
    }

    function prepareQuiz(questions) {
      const prepared = questions.map(q => {
        const rand = Math.random();
        let type = 'normal';
        if (rand < 0.3) type = 'choice';
        else if (rand < 0.6) type = 'reverse';

        let choices = [];
        if (type === 'choice') choices = generateChoices(q.a);

        return { ...q, queueId: Math.random().toString(36).substr(2, 9), quizType: type, choices, isRetry: false };
      }).sort(() => 0.5 - Math.random());

      state.quizQueue = prepared;
      state.currentIndex = 0;
      state.showAnswer = false;
      state.selectedChoice = null;
      state.choiceResult = null;
      state.sessionStats = { totalInitial: prepared.length, mistakes: 0 };
      state.screen = 'quiz';
      render();
    }

    window.handleInterrupt = function() {
      state.screen = 'home';
      render();
    }

    window.showAnswer = function() {
      state.showAnswer = true;
      render();
    }

    window.handleAnswer = async function(isCorrect) {
      const currentQ = state.quizQueue[state.currentIndex];
      
      // データ保存
      if (!currentQ.isRetry && state.user && state.fbReady) {
        const statRef = db.collection('artifacts').doc(appId).collection('users').doc(state.user.uid).collection('stats').doc(currentQ.id);
        const currentStat = state.userStats[currentQ.id] || { corrects: 0, mistakes: 0 };
        const newData = {
          corrects: isCorrect ? currentStat.corrects + 1 : currentStat.corrects,
          mistakes: !isCorrect ? currentStat.mistakes + 1 : currentStat.mistakes,
          lastAttempt: new Date().toISOString()
        };
        try { await statRef.set(newData, { merge: true }); } catch (e) { console.error(e); }
      }

      if (!isCorrect) {
        state.quizQueue.push({ ...currentQ, queueId: Math.random().toString(36).substr(2, 9), isRetry: true });
        state.sessionStats.mistakes++;
      }

      if (state.currentIndex + 1 < state.quizQueue.length || !isCorrect) {
        state.currentIndex++;
        state.showAnswer = false;
        state.selectedChoice = null;
        state.choiceResult = null;
      } else {
        state.screen = 'result';
      }
      render();
    }

    window.handleChoiceClick = function(idx) {
      if (state.selectedChoice !== null) return;
      
      const currentQ = state.quizQueue[state.currentIndex];
      const choice = currentQ.choices[idx];
      const isCorrect = choice === currentQ.a;
      
      state.selectedChoice = choice;
      state.choiceResult = isCorrect ? 'correct' : 'wrong';
      render();

      setTimeout(() => {
        handleAnswer(isCorrect);
      }, 1200);
    }

    window.goHome = function() {
      state.screen = 'home';
      render();
    }

    // ==========================================
    // 画面描画ロジック
    // ==========================================
    function renderHomeHTML() {
      if (!state.fbReady || !state.isDataLoaded) {
        return `
          <div class="flex flex-col items-center justify-center py-20 text-gray-500 animate-fade-in">
            <div class="w-8 h-8 border-4 border-blue-200 border-t-blue-500 rounded-full animate-spin mb-4"></div>
            システムを準備中...
          </div>
        `;
      }

      let contentHtml = '';
      
      if (state.activeTab === 'analytics') {
        // 分析タブの構築
        const analyzedData = rawData.map(q => {
          const stat = state.userStats[q.id] || { corrects: 0, mistakes: 0 };
          const total = stat.corrects + stat.mistakes;
          const mistakeRate = total > 0 ? Math.round((stat.mistakes / total) * 100) : 0;
          return { ...q, stat, total, mistakeRate };
        }).filter(q => q.total > 0);

        const sortedByMistake = [...analyzedData].sort((a, b) => {
          if (b.mistakeRate !== a.mistakeRate) return b.mistakeRate - a.mistakeRate;
          return b.stat.mistakes - a.stat.mistakes;
        });

        const totalQuestions = analyzedData.length;
        const totalMistakes = analyzedData.reduce((sum, q) => sum + q.stat.mistakes, 0);

        let listHtml = sortedByMistake.length === 0 
          ? `<p class="text-gray-500 text-center py-8 bg-white rounded-3xl border border-gray-100 shadow-sm mt-2">まだデータがありません。<br>問題を解くとここに分析が表示されます。</p>`
          : sortedByMistake.slice(0, 10).map((item, idx) => `
              <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-start">
                <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm mr-4 shrink-0 ${idx < 3 ? 'bg-rose-100 text-rose-600' : 'bg-gray-100 text-gray-500'}">
                  ${idx + 1}
                </div>
                <div class="flex-grow">
                  <span class="text-xs font-semibold text-indigo-500 bg-indigo-50 px-2 py-1 rounded-md mb-2 inline-block">${item.category}</span>
                  <p class="text-sm text-gray-800 font-bold mb-1 leading-snug">${item.q}</p>
                  <p class="text-xs text-rose-500 font-medium">答え: ${item.a}</p>
                </div>
                <div class="shrink-0 text-right ml-2">
                  <p class="text-rose-600 font-bold text-lg">${item.mistakeRate}%</p>
                  <p class="text-[10px] text-gray-400">ミス率</p>
                </div>
              </div>
            `).join('');

        contentHtml = `
          <div class="space-y-6 animate-fade-in">
            <div class="bg-gradient-to-br from-indigo-500 to-purple-600 rounded-3xl p-6 text-white shadow-md">
              <h2 class="text-xl font-bold mb-4 flex items-center"><i class="ph ph-chart-bar text-2xl mr-2"></i>学習の分析</h2>
              <div class="grid grid-cols-2 gap-4">
                <div class="bg-white/20 rounded-2xl p-4 text-center">
                  <p class="text-sm opacity-90 mb-1">取り組んだ問題</p>
                  <p class="text-3xl font-black">${totalQuestions} <span class="text-sm font-normal">問</span></p>
                </div>
                <div class="bg-white/20 rounded-2xl p-4 text-center">
                  <p class="text-sm opacity-90 mb-1">累計ミス回数</p>
                  <p class="text-3xl font-black">${totalMistakes} <span class="text-sm font-normal">回</span></p>
                </div>
              </div>
            </div>
            <div>
              <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                <i class="ph-fill ph-warning text-xl mr-2 text-rose-500"></i>要注意！苦手な問題トップ
              </h3>
              <div class="space-y-3">${listHtml}</div>
            </div>
          </div>
        `;
      } else {
        // 学習タブの構築
        const subsHtml = subjects.map(sub => `
          <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
            <h2 class="text-xl font-bold text-gray-800 flex items-center mb-4">
              <i class="ph-fill ph-book-open text-xl mr-2 text-blue-500"></i>${sub.name}
            </h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <button onclick="startQuiz('${sub.name}', 'all')" class="flex items-center justify-between p-4 rounded-2xl bg-gray-800 text-white font-medium hover:bg-gray-700 transition-colors active:scale-95">
                <span>${sub.name} 全てをミックス</span>
                <i class="ph-fill ph-play text-xl"></i>
              </button>
              ${sub.categories.map(cat => `
                <button onclick="startQuiz('${sub.name}', '${cat}')" class="flex items-center justify-between p-4 rounded-2xl bg-gray-50 hover:bg-gray-100 text-gray-700 font-medium transition-colors border border-gray-200 active:scale-95">
                  <span class="truncate pr-2">${cat}</span>
                  <i class="ph ph-arrow-right text-xl text-gray-400"></i>
                </button>
              `).join('')}
            </div>
          </div>
        `).join('');

        contentHtml = `
          <div class="space-y-8 animate-fade-in">
            <div class="bg-rose-50 border-2 border-rose-200 p-6 rounded-3xl shadow-sm relative overflow-hidden">
              <div class="relative z-10 flex flex-col sm:flex-row items-center justify-between">
                <div class="mb-4 sm:mb-0 text-center sm:text-left">
                  <h2 class="text-xl font-bold text-rose-700 mb-1 flex items-center justify-center sm:justify-start">
                    <i class="ph-fill ph-warning text-xl mr-2"></i>苦手克服モード
                  </h2>
                  <p class="text-sm text-rose-600/80">過去に間違えた問題を優先的に出題します</p>
                </div>
                <button onclick="startWeaknessQuiz()" class="w-full sm:w-auto px-6 py-4 rounded-2xl bg-rose-500 text-white font-bold hover:bg-rose-600 active:scale-95 transition-all shadow-md flex items-center justify-center">
                  特訓スタート <i class="ph-fill ph-play text-xl ml-2"></i>
                </button>
              </div>
            </div>
            ${subsHtml}
          </div>
        `;
      }

      return `
        <div class="max-w-2xl mx-auto p-4 animate-fade-in pb-20">
          <div class="text-center mb-8 mt-8">
            <div class="inline-flex items-center justify-center p-4 bg-yellow-100 rounded-full mb-4 shadow-inner">
              <i class="ph-fill ph-crown text-5xl text-yellow-500"></i>
            </div>
            <h1 class="text-2xl sm:text-3xl font-extrabold text-gray-800 tracking-tight leading-tight">
              【最強】最強！<br>暗記完璧最強アプリ(最強)
            </h1>
            <p class="text-gray-500 mt-3 font-medium">データ駆動で100点を狙う</p>
          </div>
          <div class="flex bg-gray-200 p-1 rounded-xl mb-8">
            <button onclick="switchTab('study')" class="flex-1 py-3 text-sm font-bold rounded-lg transition-all ${state.activeTab === 'study' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'}">
              学習する
            </button>
            <button onclick="switchTab('analytics')" class="flex-1 py-3 text-sm font-bold rounded-lg transition-all ${state.activeTab === 'analytics' ? 'bg-white shadow-sm text-purple-600' : 'text-gray-500'}">
              データと分析
            </button>
          </div>
          ${contentHtml}
        </div>
      `;
    }

    function renderQuizHTML() {
      const currentQ = state.quizQueue[state.currentIndex];
      if (!currentQ) return '';

      const isChoice = currentQ.quizType === 'choice';
      const isReverse = currentQ.quizType === 'reverse';
      const totalCurrent = state.quizQueue.length;
      const progressPercent = (state.currentIndex / totalCurrent) * 100;

      let cardHtml = '';

      if (isChoice) {
        const choicesHtml = currentQ.choices.map((choice, idx) => {
          let btnClass = "bg-gray-50 border-2 border-gray-200 text-gray-700 hover:bg-blue-50 hover:border-blue-300";
          let iconHtml = "";

          if (state.selectedChoice === choice) {
            if (state.choiceResult === 'correct') {
              btnClass = "bg-emerald-50 border-emerald-500 text-emerald-700";
              iconHtml = `<i class="ph-fill ph-check-circle text-2xl shrink-0 ml-2 text-emerald-500"></i>`;
            } else {
              btnClass = "bg-rose-50 border-rose-500 text-rose-700";
              iconHtml = `<i class="ph-fill ph-x-circle text-2xl shrink-0 ml-2 text-rose-500"></i>`;
            }
          } else if (state.selectedChoice && choice === currentQ.a) {
            btnClass = "bg-emerald-50 border-emerald-500 text-emerald-700 opacity-50";
          } else if (state.selectedChoice) {
            btnClass = "bg-gray-50 border-2 border-gray-200 text-gray-400 opacity-50";
          }

          return `
            <button
              ${state.selectedChoice !== null ? 'disabled' : ''}
              onclick="handleChoiceClick(${idx})"
              class="p-4 rounded-2xl font-bold text-lg sm:text-xl transition-all duration-200 ${btnClass} flex items-center justify-between active:scale-95 disabled:cursor-default disabled:active:scale-100"
            >
              <span class="text-left">${choice}</span>
              ${iconHtml}
            </button>
          `;
        }).join('');

        cardHtml = `
          <div class="w-full flex flex-col items-center justify-center h-full pt-4">
            <h2 class="text-lg sm:text-xl font-bold text-gray-800 mb-8 leading-relaxed">${currentQ.q}</h2>
            <div class="grid grid-cols-1 gap-3 w-full">${choicesHtml}</div>
          </div>
        `;
      } else {
        const questionText = isReverse ? currentQ.a : currentQ.q;
        const answerText = isReverse ? currentQ.q : currentQ.a;
        const titleText = isReverse ? 'これは何の説明？' : '問題';
        
        let answerArea = `
          <div class="mt-12 w-full">
             <p class="text-gray-400 text-sm mb-4">答えを頭に思い浮かべてから...</p>
          </div>
        `;
        if (state.showAnswer) {
          answerArea = `
            <div class="mt-8 pt-8 border-t border-gray-100 w-full animate-fade-in">
              <p class="text-sm text-blue-500 mb-3 font-medium">答え</p>
              <p class="font-extrabold text-blue-600 ${isReverse ? 'text-xl sm:text-2xl leading-relaxed' : 'text-3xl'}">${answerText}</p>
            </div>
          `;
        }

        cardHtml = `
          <div class="w-full flex flex-col items-center justify-center h-full">
            <p class="text-sm text-gray-500 mb-6 font-medium">${titleText}</p>
            <h2 class="font-bold text-gray-800 ${isReverse ? 'text-3xl' : 'text-xl sm:text-2xl leading-relaxed'}">${questionText}</h2>
            ${answerArea}
          </div>
        `;
      }

      let footerHtml = '';
      if (!isChoice) {
        if (!state.showAnswer) {
          footerHtml = `
            <button onclick="showAnswer()" class="w-full bg-gray-800 text-white font-bold text-lg p-5 rounded-2xl shadow-md hover:bg-gray-700 active:scale-95 transition-all">
              答えを見る
            </button>
          `;
        } else {
          footerHtml = `
            <div class="flex gap-4 animate-fade-in h-full">
              <button onclick="handleAnswer(false)" class="flex-1 bg-rose-100 text-rose-600 border-2 border-rose-200 font-bold text-lg p-4 rounded-2xl hover:bg-rose-200 active:scale-95 transition-all flex flex-col items-center justify-center">
                <i class="ph-fill ph-x text-2xl mb-1"></i><span class="text-sm">間違えた</span>
              </button>
              <button onclick="handleAnswer(true)" class="flex-1 bg-emerald-500 text-white font-bold text-lg p-4 rounded-2xl shadow-md hover:bg-emerald-600 active:scale-95 transition-all flex flex-col items-center justify-center">
                <i class="ph-fill ph-check text-2xl mb-1"></i><span class="text-sm">覚えた！</span>
              </button>
            </div>
          `;
        }
      }

      return `
        <div class="max-w-xl mx-auto p-4 min-h-screen flex flex-col pt-6 pb-8 animate-fade-in">
          <div class="mb-6">
            <div class="flex justify-between items-end mb-3">
              <button onclick="handleInterrupt()" class="flex items-center justify-center p-2 rounded-xl bg-white border border-gray-200 text-gray-500 hover:bg-gray-50 hover:text-gray-800 transition-colors shadow-sm">
                <i class="ph-fill ph-house text-lg mr-1"></i><span class="text-xs font-bold">中断</span>
              </button>
              <div class="text-right">
                <div class="text-gray-500 text-xs font-medium flex items-center justify-end mb-1">
                  <i class="ph-fill ph-stack text-sm mr-1"></i>
                  ${currentQ.category} ${currentQ.isRetry ? '<span class="ml-1 text-rose-500 font-bold">(復習)</span>' : ''}
                </div>
                <span class="text-blue-600 bg-blue-100 px-3 py-1 rounded-full text-sm font-bold">
                  ${state.currentIndex + 1} / ${totalCurrent}
                </span>
              </div>
            </div>
            <div class="h-3 w-full bg-gray-200 rounded-full overflow-hidden">
              <div class="h-full bg-blue-500 transition-all duration-300 ease-out" style="width: ${progressPercent}%"></div>
            </div>
          </div>
          <div class="flex-grow flex flex-col">
            <div class="bg-white p-6 sm:p-10 rounded-3xl shadow-lg border border-gray-100 flex-grow flex flex-col items-center justify-center text-center relative overflow-hidden">
              <div class="absolute top-4 left-4 bg-gray-100 text-gray-500 text-xs px-2 py-1 rounded-md font-medium uppercase tracking-wider">
                ${isChoice ? '4択問題' : isReverse ? '逆引き' : '通常'}
              </div>
              ${cardHtml}
            </div>
          </div>
          <div class="mt-6 mb-4 h-20">
            ${footerHtml}
          </div>
        </div>
      `;
    }

    function renderResultHTML() {
      const isPerfect = state.sessionStats.mistakes === 0;
      return `
        <div class="max-w-md mx-auto p-6 min-h-screen flex flex-col items-center justify-center text-center animate-fade-in">
          <div class="w-24 h-24 bg-yellow-100 rounded-full flex items-center justify-center mb-6 shadow-inner">
            <i class="ph-fill ph-medal text-5xl text-yellow-500"></i>
          </div>
          <h1 class="text-3xl font-extrabold text-gray-800 mb-2">コンプリート！</h1>
          <p class="text-gray-500 mb-8">すべての問題をクリアしました。<br>データは自動的に保存されています。</p>
          
          <div class="bg-white w-full p-6 rounded-3xl shadow-sm border border-gray-100 mb-8">
            <h3 class="text-sm text-gray-500 font-medium mb-4 uppercase tracking-wider">今回のセッション記録</h3>
            <div class="flex justify-around">
              <div class="text-center">
                <p class="text-3xl font-black text-gray-800">${state.sessionStats.totalInitial}</p>
                <p class="text-xs text-gray-500 mt-1">出題数</p>
              </div>
              <div class="w-px bg-gray-200"></div>
              <div class="text-center">
                <p class="text-3xl font-black text-rose-500">${state.sessionStats.mistakes}</p>
                <p class="text-xs text-gray-500 mt-1">やり直し回数</p>
              </div>
            </div>
            ${isPerfect ? `
              <div class="mt-6 bg-emerald-50 text-emerald-700 p-3 rounded-xl text-sm font-medium flex items-center justify-center">
                <i class="ph-fill ph-check-circle text-xl mr-2"></i>一発クリア！完璧です！
              </div>
            ` : ''}
          </div>
          <button onclick="goHome()" class="flex items-center justify-center w-full bg-gray-800 text-white font-bold text-lg p-5 rounded-2xl shadow-md hover:bg-gray-700 active:scale-95 transition-all">
            <i class="ph ph-arrow-counter-clockwise text-xl mr-2"></i>ホームに戻る
          </button>
        </div>
      `;
    }

    function render() {
      const root = document.getElementById('root');
      if (state.screen === 'home') root.innerHTML = renderHomeHTML();
      else if (state.screen === 'quiz') root.innerHTML = renderQuizHTML();
      else if (state.screen === 'result') root.innerHTML = renderResultHTML();
    }

    // 初回描画
    render();

  </script>
</body>
</html>
